$kind: http-example
request:
  url: "{{baseUrl}}/api/users/login"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": "ahmed.hassan@example.com",
        "password": "SecurePass@123"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "message": "User not found."
      }
order: 3000
