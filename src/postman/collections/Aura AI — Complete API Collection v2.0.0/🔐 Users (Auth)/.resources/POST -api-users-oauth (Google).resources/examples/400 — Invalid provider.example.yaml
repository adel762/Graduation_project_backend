$kind: http-example
request:
  url: "{{baseUrl}}/api/users/oauth"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "username": "Sara Kamal",
        "email": "sara.kamal@gmail.com",
        "auth_provider": "google"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "message": "Invalid auth_provider. Must be \"google\" or \"apple\"."
      }
order: 2000
