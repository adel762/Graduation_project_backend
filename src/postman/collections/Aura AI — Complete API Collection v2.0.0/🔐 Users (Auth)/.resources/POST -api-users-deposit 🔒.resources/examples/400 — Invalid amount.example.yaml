$kind: http-example
request:
  url: "{{baseUrl}}/api/users/deposit"
  method: POST
  headers:
    Content-Type: application/json
    Authorization: Bearer {{token}}
  body:
    type: json
    content: |-
      {
        "amount": 50000.00
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": false,
        "data": null,
        "message": "Deposit amount must be greater than 0."
      }
order: 2000
