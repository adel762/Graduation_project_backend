$kind: http-example
request:
  url: "{{baseUrl}}/api/automations/{{automationId}}"
  method: DELETE
  headers:
    Authorization: Bearer {{token}}
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": true,
        "data": { "deleted_id": 1 },
        "message": "Automation deleted successfully."
      }
order: 1000
