$kind: http-example
request:
  url: "{{baseUrl}}/api/automations/{{automationId}}"
  method: PATCH
  headers:
    Content-Type: application/json
    Authorization: Bearer {{token}}
  body:
    type: json
    content: |-
      {
        "trigger_price": 63.50,
        "quantity": 20,
        "action_type": "BUY"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": true,
        "data": {
          "id": 1,
          "user_id": 1,
          "stock_id": 1,
          "action_type": "BUY",
          "trigger_price": "63.50",
          "quantity": "20.0000",
          "status": "PENDING",
          "created_at": "2026-06-28T01:00:00.000Z",
          "updated_at": "2026-06-28T01:30:00.000Z",
          "stock": { "id": 1, "symbol": "COMI", "name_en": "Commercial International Bank", "name_ar": "البنك التجاري الدولي" }
        },
        "message": "Automation updated successfully."
      }
order: 1000
