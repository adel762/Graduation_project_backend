$kind: http-example
request:
  url: "{{baseUrl}}/api/automations/{{automationId}}"
  method: PATCH
  headers:
    Content-Type: application/json
    Authorization: Bearer {{token}}
  body:
    type: json
    content: |-
      {
        "trigger_price": 63.50,
        "quantity": 20,
        "action_type": "BUY"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": false,
        "data": null,
        "message": "Cannot update an already-triggered automation."
      }
order: 2000
