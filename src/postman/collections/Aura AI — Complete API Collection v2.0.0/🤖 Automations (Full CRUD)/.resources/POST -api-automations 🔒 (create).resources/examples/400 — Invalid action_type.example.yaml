$kind: http-example
request:
  url: "{{baseUrl}}/api/automations"
  method: POST
  headers:
    Content-Type: application/json
    Authorization: Bearer {{token}}
  body:
    type: json
    content: |-
      {
        "stock_id": 1,
        "action_type": "BUY",
        "trigger_price": 65.00,
        "quantity": 15
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": false,
        "data": null,
        "message": "action_type must be BUY or SELL."
      }
order: 3000
