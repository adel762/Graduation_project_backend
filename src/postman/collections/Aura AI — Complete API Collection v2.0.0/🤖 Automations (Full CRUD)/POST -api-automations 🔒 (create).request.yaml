$kind: http-request
name: POST /api/automations 🔒 (create)
url: "{{baseUrl}}/api/automations"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: |-
    {
      "stock_id": 1,
      "action_type": "BUY",
      "trigger_price": 65.00,
      "quantity": 15
    }
scripts:
  - type: afterResponse
    code: |-
      const json = pm.response.json();
      if (pm.response.code === 201 && json.success && json.data && json.data.id) {
          pm.collectionVariables.set('automationId', json.data.id.toString());
          console.log('✅ automationId auto-saved: ' + json.data.id);
      } else {
          console.warn('⚠️ Could not auto-save automationId.');
      }
    language: text/javascript
examples: ./.resources/POST -api-automations 🔒 (create).resources/examples
order: 1000
