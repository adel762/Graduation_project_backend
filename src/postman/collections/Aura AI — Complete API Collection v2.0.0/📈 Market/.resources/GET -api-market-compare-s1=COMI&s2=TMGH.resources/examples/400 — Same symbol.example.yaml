$kind: http-example
request:
  url: "{{baseUrl}}/api/market/compare?s1=COMI&s2=TMGH"
  method: GET
  queryParams:
    - key: s1
      value: COMI
      description: First stock symbol
    - key: s2
      value: TMGH
      description: Second stock symbol
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": false,
        "data": null,
        "message": "s1 and s2 must be different stock symbols."
      }
order: 2000
