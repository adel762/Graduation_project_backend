$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/logout"
  method: POST
  headers:
    Content-Type: application/json
    Authorization: Bearer {{token}}
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": true,
        "data": null,
        "message": "Logged out successfully. Token has been invalidated."
      }
order: 1000
