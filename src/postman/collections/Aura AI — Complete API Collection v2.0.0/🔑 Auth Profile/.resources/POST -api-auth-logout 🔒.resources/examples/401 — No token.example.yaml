$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/logout"
  method: POST
  headers:
    Content-Type: application/json
    Authorization: Bearer {{token}}
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": false,
        "data": null,
        "message": "No token provided."
      }
order: 2000
