$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/me"
  method: GET
  headers:
    Authorization: Bearer {{token}}
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": false,
        "data": null,
        "message": "Token has been invalidated. Please log in again."
      }
order: 2000
