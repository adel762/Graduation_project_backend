$kind: http-example
request:
  url: "{{baseUrl}}/api/portfolio?limit=20&offset=0"
  method: GET
  headers:
    Authorization: Bearer {{token}}
  queryParams:
    - key: limit
      value: "20"
      description: Max holdings per page
    - key: offset
      value: "0"
      description: Holdings to skip
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": true,
        "data": {
          "summary": {
            "wallet_balance": 49275.00,
            "total_investment": 725.00,
            "current_stocks_value": 731.00,
            "total_profit_loss": 6.00,
            "total_profit_loss_pct": 0.83,
            "net_worth": 50006.00
          },
          "pagination": {
            "total": 1,
            "limit": 20,
            "offset": 0
          },
          "holdings": [
            {
              "id": 1,
              "stock": {
                "id": 1,
                "symbol": "COMI",
                "name_en": "Commercial International Bank",
                "name_ar": "البنك التجاري الدولي",
                "prices": [{ "current_price": "73.10", "change_percentage": "0.83", "is_positive": true }]
              },
              "quantity": 10,
              "average_buy_price": 72.50,
              "current_price": 73.10,
              "cost_basis": 725.00,
              "current_value": 731.00,
              "profit_loss": 6.00,
              "profit_loss_pct": 0.83
            }
          ]
        },
        "message": "Portfolio fetched successfully."
      }
order: 1000
