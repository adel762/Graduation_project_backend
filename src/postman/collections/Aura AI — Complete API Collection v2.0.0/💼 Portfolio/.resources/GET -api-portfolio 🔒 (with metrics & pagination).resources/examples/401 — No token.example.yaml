$kind: http-example
request:
  url: "{{baseUrl}}/api/portfolio?limit=20&offset=0"
  method: GET
  headers:
    Authorization: Bearer {{token}}
  queryParams:
    - key: limit
      value: "20"
      description: Max holdings per page
    - key: offset
      value: "0"
      description: Holdings to skip
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": false,
        "data": null,
        "message": "No token provided."
      }
order: 3000
