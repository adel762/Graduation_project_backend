$kind: http-example
request:
  url: "{{baseUrl}}/api/portfolio/trade"
  method: POST
  headers:
    Content-Type: application/json
    Authorization: Bearer {{token}}
  body:
    type: json
    content: |-
      {
        "stock_id": 1,
        "type": "BUY",
        "quantity": 10
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": false,
        "data": null,
        "message": "Insufficient balance. Required: 725.00 EGP, Available: 100.00 EGP."
      }
order: 2000
