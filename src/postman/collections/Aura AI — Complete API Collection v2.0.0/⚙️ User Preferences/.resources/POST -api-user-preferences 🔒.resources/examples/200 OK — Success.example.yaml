$kind: http-example
request:
  url: "{{baseUrl}}/api/user/preferences"
  method: POST
  headers:
    Content-Type: application/json
    Authorization: Bearer {{token}}
  body:
    type: json
    content: |-
      {
        "risk_tolerance": "High",
        "primary_goal": "Growth"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": true,
        "data": {
          "id": 1,
          "user_id": 1,
          "risk_tolerance": "High",
          "primary_goal": "Growth",
          "created_at": "2026-06-28T00:00:00.000Z",
          "updated_at": "2026-06-28T00:10:00.000Z"
        },
        "message": "Investment preferences saved successfully."
      }
order: 1000
